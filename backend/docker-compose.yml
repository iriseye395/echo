services:
  postgres:
    image: postgres:16
    container_name: echo-postgres
    environment:
      POSTGRES_USER: echo
      POSTGRES_PASSWORD: echo
      POSTGRES_DB: echo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: echo-redis
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:latest
    container_name: echo-kafka
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "9092:9092"



  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: echo-azurite
    command: "azurite-blob --blobHost 0.0.0.0 --blobPort 10000"
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data

  api:
    build: .
    container_name: echo-api
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/srv/backend/app
    depends_on:
      - postgres
      - redis
      - kafka
      - azurite
    ports:
      - "8000:8000"

  worker:
    build: .
    container_name: echo-worker
    env_file:
      - .env
    command: python -m app.workers.encoder_worker
    volumes:
      - ./app:/srv/backend/app
    depends_on:
      - postgres
      - redis
      - kafka
      - azurite

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: echo-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      INTERNAL_API_BASE_URL: http://api:8000
      ECHO_BACKEND_EMAIL: admin@gmail.com
      ECHO_BACKEND_PASSWORD: admin
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  azurite_data:
